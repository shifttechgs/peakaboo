deployment:
  tasks:
    - export APPPATH=/home/peekaboodaycarec/public_html/peekaboo

    # ── 1. Maintenance mode ──
    - php $APPPATH/artisan down --refresh=15 || true

    # ── 2. Ensure required directories exist ──
    - mkdir -p $APPPATH/storage/framework/{sessions,views,cache/data} $APPPATH/storage/logs $APPPATH/storage/app/public $APPPATH/bootstrap/cache

    # ── 3. Fix permissions ──
    - chmod -R 775 $APPPATH/storage $APPPATH/bootstrap/cache

    # ── 4. Composer install ONLY if vendor missing or composer.lock changed ──
    - cd $APPPATH && test -d vendor || composer install --no-dev --optimize-autoloader --no-interaction 2>&1

    # ── 5. Clear old caches + rebuild in one go ──
    - php $APPPATH/artisan optimize:clear
    - php $APPPATH/artisan migrate --force
    - php $APPPATH/artisan storage:link 2>/dev/null || true
    - php $APPPATH/artisan optimize

    # ── 6. Back online ──
    - php $APPPATH/artisan up
