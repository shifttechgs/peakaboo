deployment:
  tasks:
    - export APPPATH=/home/peekaboodaycarec/public_html/peekaboo

    # Maintenance mode (non-blocking)
    - php $APPPATH/artisan down || true

    # Ensure required directories exist (only if missing)
    - mkdir -p $APPPATH/storage/framework/{sessions,views,cache/data}
    - mkdir -p $APPPATH/storage/logs
    - mkdir -p $APPPATH/bootstrap/cache

    # Fix permissions (important but quick)
    - chmod -R 775 $APPPATH/storage
    - chmod -R 775 $APPPATH/bootstrap/cache

    # Clear only (fast)
    - php $APPPATH/artisan optimize:clear

    # Run migrations (keep this)
    - php $APPPATH/artisan migrate --force

    # Bring app back up ASAP
    - php $APPPATH/artisan up
