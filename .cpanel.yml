deployment:
  tasks:
    - export APPPATH=/home/peekaboodaycarec/peekaboo
    - export PUBPATH=/home/peekaboodaycarec/public_html

    # ── Maintenance mode ─────────────────────────────────────────────────────
    - php $APPPATH/artisan down --retry=15 || true

    # ── Sync Laravel app files (kept OUTSIDE public_html for security) ───────
    - mkdir -p $APPPATH
    - /bin/cp -R app $APPPATH
    - /bin/cp -R bootstrap $APPPATH
    - /bin/cp -R config $APPPATH
    - /bin/cp -R database $APPPATH
    - /bin/cp -R lang $APPPATH || true
    - /bin/cp -R resources $APPPATH
    - /bin/cp -R routes $APPPATH
    - /bin/cp artisan $APPPATH
    - /bin/cp composer.json $APPPATH
    - /bin/cp composer.lock $APPPATH

    # ── Install/update Composer dependencies ─────────────────────────────────
    - cd $APPPATH && composer install --no-dev --optimize-autoloader --no-interaction

    # ── Ensure writable directories exist ────────────────────────────────────
    - mkdir -p $APPPATH/storage/framework/sessions
    - mkdir -p $APPPATH/storage/framework/views
    - mkdir -p $APPPATH/storage/framework/cache/data
    - mkdir -p $APPPATH/storage/logs
    - mkdir -p $APPPATH/bootstrap/cache
    - chmod -R 775 $APPPATH/storage
    - chmod -R 775 $APPPATH/bootstrap/cache

    # ── Sync public assets to document root ──────────────────────────────────
    - /bin/cp -R public/assets $PUBPATH || true
    - /bin/cp -R public/build $PUBPATH || true
    - /bin/cp public/.htaccess $PUBPATH
    - /bin/cp public/favicon.ico $PUBPATH || true
    - /bin/cp public/robots.txt $PUBPATH || true
    - /bin/cp public/index.php $PUBPATH

    # Fix index.php so it resolves paths to the app outside public_html
    - sed -i "s|__DIR__\.'/../|'$APPPATH/|g" $PUBPATH/index.php

    # ── Clear all Laravel caches ──────────────────────────────────────────────
    - php $APPPATH/artisan config:clear
    - php $APPPATH/artisan cache:clear
    - php $APPPATH/artisan view:clear
    - php $APPPATH/artisan route:clear

    # ── Run migrations ────────────────────────────────────────────────────────
    - php $APPPATH/artisan migrate --force

    # ── Cache config/routes for production performance ────────────────────────
    - php $APPPATH/artisan config:cache
    - php $APPPATH/artisan route:cache
    - php $APPPATH/artisan view:cache

    # ── Bring site back up ────────────────────────────────────────────────────
    - php $APPPATH/artisan up
